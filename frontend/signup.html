<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-box">

<h1>📝 Signup</h1>
<p>Create your AI Planner account</p>

<input type="text" id="signup-name" placeholder="Enter Name">

<input type="email" id="signup-email" placeholder="Enter Email">

<input type="password" id="signup-password" placeholder="Create Password">

<button onclick="signupUser()">Signup</button>

<p class="auth-link">
Already have account?
<a href="login.html">Login</a>
</p>

</div>

<script src="auth.js"></script>

</body>
</html>
