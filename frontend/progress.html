<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<script>
   let token = localStorage.getItem("token");

   if(!token){
       window.location.href = "login.html";
   }
</script>

<nav class="navbar">
<div class="logo">📘 AI Planner</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>

<header class="hero">
<h1>📈 Progress Tracker</h1>
<p>Track your study journey daily</p>
</header>

<div class="dashboard">

<div class="card">
<h3>📚 Total Subjects</h3>
<p id="totalSubjects">0</p>
</div>

<div class="card">
<h3>✅ Completed</h3>
<p id="completedSubjects">0</p>
</div>

<div class="card">
<h3>⏳ Pending</h3>
<p id="pendingSubjects">0</p>
</div>

<div class="card">
<h3>📈 Progress</h3>
<p id="progressPercent">0%</p>
<p id="progressMessage"></p>
</div>

<div class="card chart-card">
    <h3>📊 Progress Chart</h3>
    <canvas id="progressChart"></canvas>
</div>
</div>

<footer class="footer">
<p>Made with ❤️ by Devendra | AI Study Planner</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
